<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendBreak Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080d;
  --bg2: #0c1017;
  --surface: #111620;
  --surface2: #171d2a;
  --surface3: #1c2333;
  --border: #1a2035;
  --border2: #252d42;
  --text: #e8ecf4;
  --text2: #7a8599;
  --text3: #4a5568;
  --green: #00e676;
  --green2: #00c853;
  --green-dim: rgba(0,230,118,0.12);
  --red: #ff1744;
  --red2: #d50000;
  --red-dim: rgba(255,23,68,0.12);
  --blue: #448aff;
  --blue-dim: rgba(68,138,255,0.12);
  --cyan: #00e5ff;
  --cyan-dim: rgba(0,229,255,0.10);
  --yellow: #ffd740;
  --yellow-dim: rgba(255,215,64,0.12);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--mono); font-size:12px; height:100vh; overflow:hidden; }
::selection { background:var(--cyan); color:var(--bg); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── HEADER ── */
header {
  height:42px; display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; background:var(--bg2); border-bottom:1px solid var(--border);
  position:relative; z-index:10;
}
header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
}
.logo { font-family:var(--sans); font-size:15px; font-weight:700; letter-spacing:0.5px; }
.logo em { font-style:normal; color:var(--cyan); }
.hdr-right { display:flex; align-items:center; gap:14px; }
.badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:3px; font-size:10px; font-weight:600;
  letter-spacing:0.6px; text-transform:uppercase;
}
.badge-live { background:var(--red-dim); color:var(--red); border:1px solid rgba(255,23,68,0.25); }
.badge-sim  { background:var(--cyan-dim); color:var(--cyan); border:1px solid rgba(0,229,255,0.2); }
.badge-conn { background:var(--green-dim); color:var(--green); border:1px solid rgba(0,230,118,0.2); }
.badge-disc { background:var(--red-dim); color:var(--red); border:1px solid rgba(255,23,68,0.2); }
.dot { width:6px; height:6px; border-radius:50%; }
.dot-on  { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
.dot-off { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── GRID ── */
.grid {
  display:grid; height:calc(100vh - 42px);
  grid-template-columns:260px 1fr 280px;
  grid-template-rows:1fr;
}

/* ── LEFT ── */
.left {
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow-y:auto;
}
.section { padding:14px 16px; border-bottom:1px solid var(--border); }
.sec-title {
  font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1.2px;
  margin-bottom:10px; font-weight:600;
}

/* Live price */
.price-box { text-align:center; padding:20px 16px 16px; }
.price-main {
  font-family:var(--sans); font-size:32px; font-weight:700;
  letter-spacing:-1px; transition:color 0.3s;
}
.price-main.up { color:var(--green); }
.price-main.down { color:var(--red); }
.price-main.flat { color:var(--text); }
.price-symbol { font-size:11px; color:var(--text2); margin-top:2px; }
.price-change {
  display:inline-block; margin-top:8px; padding:3px 10px; border-radius:3px;
  font-size:11px; font-weight:600; transition:all 0.3s;
}
.price-change.up { background:var(--green-dim); color:var(--green); }
.price-change.down { background:var(--red-dim); color:var(--red); }

/* Stats */
.srow { display:flex; justify-content:space-between; align-items:center; padding:3px 0; }
.srow .k { color:var(--text2); font-size:11px; }
.srow .v { font-weight:600; font-size:12px; }
.v-green { color:var(--green); }
.v-red { color:var(--red); }
.v-cyan { color:var(--cyan); }
.v-yellow { color:var(--yellow); }

/* Position */
.pos-card {
  background:var(--surface); border-radius:6px; padding:12px;
  border:1px solid var(--border); position:relative; overflow:hidden;
}
.pos-card::before {
  content:''; position:absolute; top:0; left:0; bottom:0; width:3px;
}
.pos-card.long::before { background:var(--green); }
.pos-card.short::before { background:var(--red); }
.pos-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.pos-side {
  font-family:var(--sans); font-size:14px; font-weight:700;
}
.pos-side.long { color:var(--green); }
.pos-side.short { color:var(--red); }
.pos-pnl { font-size:13px; font-weight:700; }
.pos-empty { text-align:center; padding:16px 0; color:var(--text3); font-size:11px; }

/* Buttons */
.btns { display:flex; gap:8px; padding:14px 16px; margin-top:auto; }
.btn {
  flex:1; padding:10px; border:none; border-radius:4px; cursor:pointer;
  font-family:var(--mono); font-size:11px; font-weight:600;
  text-transform:uppercase; letter-spacing:0.5px; transition:all 0.15s;
}
.btn:hover { filter:brightness(1.2); transform:translateY(-1px); }
.btn:active { transform:translateY(0); }
.btn-stop { background:linear-gradient(135deg, var(--red2), var(--red)); color:white; }
.btn-restart { background:var(--surface2); color:var(--text); border:1px solid var(--border2); }

/* ── CENTER ── */
.center { display:flex; flex-direction:column; background:var(--bg); overflow:hidden; }
.chart-bar {
  display:flex; align-items:center; justify-content:space-between;
  height:36px; padding:0 12px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  font-size:11px;
}
.chart-bar .pair { font-family:var(--sans); font-weight:600; font-size:13px; }
.chart-bar .meta { color:var(--text2); display:flex; gap:14px; }
.chart-area { flex:1; position:relative; }
canvas#chart { display:block; width:100%; height:100%; }

/* Trend strip */
.trend-strip {
  height:32px; display:flex; align-items:center; gap:14px; padding:0 12px;
  background:var(--bg2); border-top:1px solid var(--border); font-size:11px;
}
.trend-tag {
  padding:2px 8px; border-radius:3px; font-weight:600; font-size:10px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.trend-tag.up { background:var(--green-dim); color:var(--green); }
.trend-tag.down { background:var(--red-dim); color:var(--red); }
.trend-tag.sideways { background:var(--yellow-dim); color:var(--yellow); }
.trend-strip .td { color:var(--text2); }
.trend-strip .td b { color:var(--text); font-weight:500; }

/* Bottom bar */
.bottom-bar {
  display:flex; height:52px;
  background:var(--bg2); border-top:1px solid var(--border);
}
.bb-cell {
  flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
  border-right:1px solid var(--border); padding:4px;
}
.bb-cell:last-child { border-right:none; }
.bb-val { font-family:var(--sans); font-size:16px; font-weight:700; }
.bb-lbl { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-top:1px; }

/* ── RIGHT ── */
.right {
  background:var(--bg2); border-left:1px solid var(--border);
  display:flex; flex-direction:column;
}
.tabs {
  display:flex; height:36px; border-bottom:1px solid var(--border);
}
.tab {
  flex:1; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px;
  cursor:pointer; color:var(--text3); transition:all 0.2s;
  border-bottom:2px solid transparent;
}
.tab:hover { color:var(--text2); }
.tab.on { color:var(--cyan); border-bottom-color:var(--cyan); }
.tab-body { flex:1; overflow-y:auto; display:none; }
.tab-body.on { display:block; }

/* Log */
.log-entry {
  padding:6px 12px; border-bottom:1px solid var(--border);
  font-size:10.5px; line-height:1.6; word-break:break-word;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.log-entry .lt { color:var(--text3); margin-right:6px; }
.log-entry.long .lm { color:var(--green); }
.log-entry.short .lm { color:var(--red); }
.log-entry.close .lm { color:var(--yellow); }
.log-entry.error .lm { color:var(--red); opacity:0.8; }
.log-entry.info .lm { color:var(--text2); }

/* Settings */
.settings { padding:12px; }
.fld { margin-bottom:10px; }
.fld label {
  display:block; font-size:10px; color:var(--text3); text-transform:uppercase;
  letter-spacing:0.8px; margin-bottom:4px;
}
.fld input, .fld select {
  width:100%; padding:7px 10px; background:var(--surface); border:1px solid var(--border);
  border-radius:4px; color:var(--text); font-family:var(--mono); font-size:12px;
  transition:border-color 0.2s;
}
.fld input:focus, .fld select:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 2px var(--cyan-dim); }
.btn-apply {
  width:100%; padding:10px; margin-top:4px;
  background:linear-gradient(135deg, #0091ea, var(--cyan));
  color:var(--bg); border:none; border-radius:4px; cursor:pointer;
  font-family:var(--mono); font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.5px; transition:all 0.2s;
}
.btn-apply:hover { filter:brightness(1.1); transform:translateY(-1px); }

/* Responsive */
@media(max-width:1100px) {
  .grid { grid-template-columns:1fr; grid-template-rows:auto 55vh auto; }
  .left { flex-direction:row; flex-wrap:wrap; border-right:none; border-bottom:1px solid var(--border); }
  .left .section { flex:1; min-width:200px; }
  .right { max-height:35vh; }
}
</style>
</head>
<body>

<header>
  <div class="logo">TREND<em>BREAK</em></div>
  <div class="hdr-right">
    <span id="ws-badge" class="badge badge-disc"><span class="dot dot-off"></span>Bağlanıyor</span>
    <span id="mode-badge" class="badge badge-sim">SIM</span>
    <span id="bnc-badge" class="badge badge-conn" style="display:none"><span class="dot dot-on"></span>Binance</span>
  </div>
</header>

<div class="grid">

  <!-- LEFT -->
  <div class="left">
    <div class="price-box">
      <div id="price" class="price-main flat">—</div>
      <div class="price-symbol" id="sym-label">BTCUSDT</div>
      <div id="price-chg" class="price-change up" style="display:none"></div>
    </div>

    <div class="section">
      <div class="sec-title">Pozisyon</div>
      <div id="pos-area"><div class="pos-empty">Pozisyon yok</div></div>
    </div>

    <div class="section">
      <div class="sec-title">Performans</div>
      <div class="srow"><span class="k">İşlem</span><span class="v" id="s-trades">0</span></div>
      <div class="srow"><span class="k">Kazanç / Kayıp</span><span class="v" id="s-wl">0 / 0</span></div>
      <div class="srow"><span class="k">Oran</span><span class="v" id="s-wr">—</span></div>
      <div class="srow"><span class="k">Toplam PnL</span><span class="v" id="s-pnl">$0.00</span></div>
      <div class="srow"><span class="k">Cooldown</span><span class="v v-cyan" id="s-cd">—</span></div>
    </div>

    <div class="section">
      <div class="sec-title">Konfigürasyon</div>
      <div class="srow"><span class="k">Mod</span><span class="v" id="c-mode">—</span></div>
      <div class="srow"><span class="k">Kaldıraç</span><span class="v" id="c-lev">—</span></div>
      <div class="srow"><span class="k">Boyut</span><span class="v" id="c-size">—</span></div>
      <div class="srow"><span class="k">Periyot</span><span class="v" id="c-tp">—</span></div>
      <div class="srow"><span class="k">Kırılma</span><span class="v" id="c-bt">—</span></div>
      <div class="srow"><span class="k">Stop Loss</span><span class="v" id="c-sl">—</span></div>
    </div>

    <div class="btns">
      <button class="btn btn-stop" onclick="apiPost('/api/stop')">Durdur</button>
      <button class="btn btn-restart" onclick="apiPost('/api/restart')">Yeniden Başlat</button>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="chart-bar">
      <span class="pair" id="ch-pair">BTCUSDT</span>
      <div class="meta">
        <span>1m</span>
        <span id="ch-candle-count">—</span>
      </div>
    </div>
    <div class="chart-area">
      <canvas id="chart"></canvas>
    </div>
    <div class="trend-strip">
      <span style="color:var(--text2)">Trend</span>
      <span class="trend-tag" id="t-dir">—</span>
      <span class="td">H: <b id="t-h">—</b></span>
      <span class="td">L: <b id="t-l">—</b></span>
      <span class="td">Güç: <b id="t-str">—</b></span>
    </div>
    <div class="bottom-bar">
      <div class="bb-cell"><div class="bb-val" id="b-price">—</div><div class="bb-lbl">Fiyat</div></div>
      <div class="bb-cell"><div class="bb-val" id="b-pnl">$0</div><div class="bb-lbl">PnL</div></div>
      <div class="bb-cell"><div class="bb-val" id="b-trades">0</div><div class="bb-lbl">İşlem</div></div>
      <div class="bb-cell"><div class="bb-val" id="b-wr">0%</div><div class="bb-lbl">Başarı</div></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="tabs">
      <div class="tab on" data-t="log">Günlük</div>
      <div class="tab" data-t="set">Ayarlar</div>
    </div>
    <div class="tab-body on" id="p-log"><div id="log-list"></div></div>
    <div class="tab-body" id="p-set">
      <div class="settings">
        <div class="fld"><label>Sembol</label><input id="i-sym" value="BTCUSDT"></div>
        <div class="fld"><label>Mod</label><select id="i-mode"><option value="live">CANLI</option><option value="sim">SİMÜLASYON</option></select></div>
        <div class="fld"><label>Ortam</label><select id="i-demo"><option value="true">TESTNET</option><option value="false">MAINNET</option></select></div>
        <div class="fld"><label>İşlem Boyutu (USDT)</label><input id="i-size" type="number" value="100"></div>
        <div class="fld"><label>Kaldıraç</label><input id="i-lev" type="number" value="5" min="1" max="125"></div>
        <div class="fld"><label>Trend Periyodu</label><input id="i-tp" type="number" value="4" min="2" max="50"></div>
        <div class="fld"><label>Kırılma Eşiği (%)</label><input id="i-bt" type="number" value="0.05" step="0.01"></div>
        <div class="fld"><label>Stop Loss (%)</label><input id="i-sl" type="number" value="0.5" step="0.1"></div>
        <button class="btn-apply" onclick="applySettings()">Uygula & Yeniden Başlat</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════ */
let S = {}, candles = [], prevPrice = 0, lastLogTs = 0;
let chartRAF = null;

/* ── Tabs ── */
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.tab-body').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    document.getElementById('p-' + t.dataset.t).classList.add('on');
  };
});

/* ══════════════════════════════════════════════════════════════
   WEBSOCKET
   ══════════════════════════════════════════════════════════════ */
let ws, wsRetry = 0;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => {
    wsRetry = 0;
    const b = document.getElementById('ws-badge');
    b.className = 'badge badge-conn';
    b.innerHTML = '<span class="dot dot-on"></span>Bağlı';
  };
  ws.onclose = () => {
    const b = document.getElementById('ws-badge');
    b.className = 'badge badge-disc';
    b.innerHTML = '<span class="dot dot-off"></span>Bağlantı kesildi';
    setTimeout(connect, Math.min(1000 * (++wsRetry), 10000));
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.ping) return;
      // Merge
      if (d.candles) candles = d.candles;
      if (d.current_price !== undefined) {
        prevPrice = S.current_price || d.current_price;
        S.current_price = d.current_price;
      }
      Object.assign(S, d);
      render();
    } catch(err) { console.error('ws parse:', err); }
  };
}
connect();

/* ══════════════════════════════════════════════════════════════
   API
   ══════════════════════════════════════════════════════════════ */
async function apiPost(url, body) {
  try {
    await fetch(url, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
  } catch(e) { console.error(e); }
}
function applySettings() {
  apiPost('/api/config', {
    symbol: document.getElementById('i-sym').value.toUpperCase(),
    mode: document.getElementById('i-mode').value,
    demo: document.getElementById('i-demo').value,
    trade_size_usdt: +document.getElementById('i-size').value,
    leverage: +document.getElementById('i-lev').value,
    trend_period: +document.getElementById('i-tp').value,
    break_threshold: +document.getElementById('i-bt').value,
    stop_loss_pct: +document.getElementById('i-sl').value,
  });
}

/* ══════════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const fmt = (v,d=2) => v!=null ? v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}) : '—';

function render() {
  const price = S.current_price || 0;
  const dir = price > prevPrice ? 'up' : price < prevPrice ? 'down' : 'flat';

  // Price
  const pe = $('price');
  pe.textContent = fmt(price);
  pe.className = 'price-main ' + dir;
  $('sym-label').textContent = S.config?.symbol || 'BTCUSDT';
  $('ch-pair').textContent = S.config?.symbol || 'BTCUSDT';
  $('b-price').textContent = fmt(price);

  // Price change from first candle
  if (candles.length > 1) {
    const first = candles[0].o;
    const chg = ((price - first) / first * 100);
    const chgEl = $('price-chg');
    chgEl.style.display = '';
    chgEl.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
    chgEl.className = 'price-change ' + (chg >= 0 ? 'up' : 'down');
  }

  // Mode badge
  const mode = S.mode || 'sim';
  const mb = $('mode-badge');
  mb.textContent = mode === 'live' ? 'CANLI' : 'SIM';
  mb.className = 'badge ' + (mode === 'live' ? 'badge-live' : 'badge-sim');

  // Binance badge
  const bb = $('bnc-badge');
  if (mode === 'live') {
    bb.style.display = '';
    if (S.binance_ok) {
      bb.className = 'badge badge-conn';
      bb.innerHTML = '<span class="dot dot-on"></span>Binance';
    } else {
      bb.className = 'badge badge-disc';
      bb.innerHTML = '<span class="dot dot-off"></span>Binance';
    }
  } else { bb.style.display = 'none'; }

  // Position
  const pa = $('pos-area');
  if (S.position) {
    const p = S.position;
    const pnl = p.unrealized_pnl || 0;
    const pnlC = pnl >= 0 ? 'v-green' : 'v-red';
    pa.innerHTML = `
      <div class="pos-card ${p.side}">
        <div class="pos-header">
          <span class="pos-side ${p.side}">${p.side.toUpperCase()}</span>
          <span class="pos-pnl ${pnlC}">${pnl>=0?'+':''}${fmt(pnl,3)}$</span>
        </div>
        <div class="srow"><span class="k">Giriş</span><span class="v">${fmt(p.entry_price)}</span></div>
        <div class="srow"><span class="k">Miktar</span><span class="v">${p.quantity}</span></div>
        <div class="srow"><span class="k">Kaldıraç</span><span class="v">${p.leverage}x</span></div>
        <div class="srow"><span class="k">Stop Loss</span><span class="v v-red">${fmt(p.stop_loss)}</span></div>
      </div>`;
  } else {
    pa.innerHTML = '<div class="pos-empty">Pozisyon yok</div>';
  }

  // Stats
  const st = S.stats || {};
  $('s-trades').textContent = st.total_trades || 0;
  $('s-wl').textContent = `${st.wins||0} / ${st.losses||0}`;
  $('s-wr').textContent = (st.win_rate||0) + '%';
  const pnl = st.total_pnl || 0;
  const sp = $('s-pnl');
  sp.textContent = `${pnl>=0?'+':''}$${fmt(Math.abs(pnl))}`;
  sp.className = 'v ' + (pnl >= 0 ? 'v-green' : 'v-red');

  $('s-cd').textContent = (S.cooldown||0) > 0 ? (S.cooldown).toFixed(0) + 's' : 'Hazır';

  // Bottom bar
  $('b-pnl').textContent = `${pnl>=0?'+':''}$${fmt(Math.abs(pnl))}`;
  $('b-pnl').style.color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
  $('b-trades').textContent = st.total_trades || 0;
  $('b-wr').textContent = (st.win_rate||0) + '%';

  // Config
  const cfg = S.config || {};
  $('c-mode').textContent = (cfg.mode||'sim').toUpperCase();
  $('c-lev').textContent = (cfg.leverage||1) + 'x';
  $('c-size').textContent = (cfg.trade_size_usdt||0) + ' USDT';
  $('c-tp').textContent = (cfg.trend_period||4) + ' mum';
  $('c-bt').textContent = ((cfg.break_threshold||0)*100).toFixed(3) + '%';
  $('c-sl').textContent = ((cfg.stop_loss_pct||0)*100).toFixed(2) + '%';

  // Candle count
  $('ch-candle-count').textContent = candles.length + ' mum';

  // Trend
  const tr = S.trend;
  if (tr) {
    const td = $('t-dir');
    const dm = {up:'YÜKSELİŞ', down:'DÜŞÜŞ', sideways:'YATAY'};
    td.textContent = dm[tr.direction] || tr.direction;
    td.className = 'trend-tag ' + tr.direction;
    $('t-h').textContent = fmt(tr.trend_high);
    $('t-l').textContent = fmt(tr.trend_low);
    $('t-str').textContent = ((tr.strength||0)*100).toFixed(0) + '%';
  }

  // Log
  if (S.trade_log && S.trade_log.length) {
    const newMax = S.trade_log[S.trade_log.length-1].ts;
    if (newMax !== lastLogTs) {
      const el = $('log-list');
      let h = '';
      for (const l of [...S.trade_log].reverse()) {
        h += `<div class="log-entry ${l.type}"><span class="lt">${l.time}</span><span class="lm">${esc(l.msg)}</span></div>`;
      }
      el.innerHTML = h;
      lastLogTs = newMax;
    }
  }

  // Chart
  scheduleChart();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ══════════════════════════════════════════════════════════════
   CHART — Professional Candlestick
   ══════════════════════════════════════════════════════════════ */
const canvas = $('chart');
const ctx = canvas.getContext('2d');

function scheduleChart() {
  if (chartRAF) return;
  chartRAF = requestAnimationFrame(() => { chartRAF = null; drawChart(); });
}

function drawChart() {
  if (!candles.length) return;

  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const W = rect.width, H = rect.height;

  if (canvas.width !== W*dpr || canvas.height !== H*dpr) {
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
  }
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const pad = {t:12, r:64, b:20, l:6};
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;

  // Candle sizing
  const n = candles.length;
  const gap = 1.5;
  const cw = Math.max(3, Math.min(14, (chartW / n) - gap));
  const totalW = n * (cw + gap);
  const offsetX = chartW - totalW;

  // Price range
  let hi = -Infinity, lo = Infinity;
  for (const c of candles) {
    if (c.h > hi) hi = c.h;
    if (c.l < lo) lo = c.l;
  }
  const rng = hi - lo || 1;
  const margin = rng * 0.06;
  hi += margin; lo -= margin;
  const scaleY = chartH / (hi - lo);
  const toY = v => pad.t + (hi - v) * scaleY;

  // Clear
  ctx.fillStyle = '#06080d';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#111825';
  ctx.lineWidth = 0.5;
  const gridN = 7;
  ctx.font = '10px IBM Plex Mono, monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= gridN; i++) {
    const y = pad.t + i * chartH / gridN;
    const pv = hi - i * (hi - lo) / gridN;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#4a5568';
    ctx.fillText(pv.toFixed(1), W - 6, y + 3);
  }

  // Trend lines
  const tr = S.trend;
  if (tr) {
    // Resistance
    ctx.save();
    ctx.strokeStyle = 'rgba(255,23,68,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6,4]);
    let y = toY(tr.trend_high);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillStyle = 'rgba(255,23,68,0.5)';
    ctx.font = '9px IBM Plex Mono';
    ctx.textAlign = 'left';
    ctx.fillText('R ' + tr.trend_high.toFixed(1), pad.l + 4, y - 4);

    // Support
    ctx.strokeStyle = 'rgba(0,230,118,0.3)';
    y = toY(tr.trend_low);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillStyle = 'rgba(0,230,118,0.5)';
    ctx.fillText('S ' + tr.trend_low.toFixed(1), pad.l + 4, y + 12);
    ctx.restore();
  }

  // Position lines
  if (S.position) {
    ctx.save();
    ctx.setLineDash([3,3]);
    ctx.lineWidth = 1;
    // Entry
    ctx.strokeStyle = 'rgba(68,138,255,0.6)';
    let y = toY(S.position.entry_price);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillStyle = '#448aff';
    ctx.font = '9px IBM Plex Mono'; ctx.textAlign = 'left';
    ctx.fillText('▸ ENTRY ' + S.position.entry_price.toFixed(1), pad.l + 4, y - 4);
    // SL
    ctx.strokeStyle = 'rgba(255,23,68,0.5)';
    y = toY(S.position.stop_loss);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillStyle = '#ff1744';
    ctx.fillText('✕ SL ' + S.position.stop_loss.toFixed(1), pad.l + 4, y - 4);
    ctx.restore();
  }

  // Candles
  for (let i = 0; i < n; i++) {
    const c = candles[i];
    const x = pad.l + offsetX + i * (cw + gap);
    const bull = c.c >= c.o;
    const bodyColor = bull ? '#00c853' : '#ff1744';
    const wickColor = bull ? '#00e676' : '#ff1744';

    // Wick
    const mx = x + cw / 2;
    ctx.strokeStyle = wickColor;
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(mx, toY(c.h));
    ctx.lineTo(mx, toY(c.l));
    ctx.stroke();

    // Body
    const bTop = toY(Math.max(c.o, c.c));
    const bBot = toY(Math.min(c.o, c.c));
    const bH = Math.max(1, bBot - bTop);

    if (bull) {
      // Hollow or filled — filled with glow
      ctx.fillStyle = bodyColor;
      ctx.fillRect(x, bTop, cw, bH);
      // Subtle glow
      ctx.shadowColor = '#00e676';
      ctx.shadowBlur = 4;
      ctx.fillRect(x, bTop, cw, bH);
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = bodyColor;
      ctx.fillRect(x, bTop, cw, bH);
      ctx.shadowColor = '#ff1744';
      ctx.shadowBlur = 4;
      ctx.fillRect(x, bTop, cw, bH);
      ctx.shadowBlur = 0;
    }
  }

  // Current price crosshair
  const cp = S.current_price;
  if (cp && cp >= lo && cp <= hi) {
    const cpy = toY(cp);
    ctx.setLineDash([2,3]);
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, cpy); ctx.lineTo(W-pad.r, cpy); ctx.stroke();
    ctx.setLineDash([]);

    // Label
    const lblW = 60;
    ctx.fillStyle = '#00e5ff';
    const rx = W - pad.r;
    roundRect(ctx, rx, cpy - 10, lblW, 20, 3);
    ctx.fill();
    ctx.fillStyle = '#06080d';
    ctx.font = 'bold 11px IBM Plex Mono';
    ctx.textAlign = 'center';
    ctx.fillText(cp.toFixed(1), rx + lblW/2, cpy + 4);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// Resize
window.addEventListener('resize', scheduleChart);
// Initial draw
requestAnimationFrame(drawChart);
</script>
</body>
</html>
